<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Crime Partner | Happy Married Life Dii</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fffaf0; }
        .handwritten { font-family: 'Caveat', cursive; }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- AUDIO ELEMENT -->
    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <!-- SECTION 1: HERO -->
    <section class="min-h-screen flex flex-col justify-center items-center bg-radial from-rose-100 to-amber-50 px-4 text-center">
        <h1 class="text-4xl md:text-6xl font-bold text-rose-800 mb-4 animate-bounce">To My Crime Partner 🫶</h1>
        <p class="text-lg text-gray-600 max-w-md mb-8">Dii, click the magical heart below to step into a box full of your favorite memories.</p>
        <button onclick="unlockMemories()" class="cursor-pointer bg-rose-500 hover:bg-rose-600 text-white text-3xl p-6 rounded-full shadow-lg transition-transform hover:scale-115 active:scale-95 duration-300">
            💝
        </button>
    </section>

    <!-- HIDDEN WRAPPER -->
    <div id="main-content" class="hidden opacity-0 transition-opacity duration-1000">
        
        <!-- SECTION 2: TIMELINE -->
        <section class="py-20 px-4 max-w-4xl mx-auto">
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-12 handwritten text-5xl text-rose-700">The Journey So Far...</h2>
            <div class="space-y-24 relative before:absolute before:inset-0 before:left-4 md:before:left-1/2 before:w-0.5 before:bg-rose-200">
                
                <!-- Memory 1 -->
                <div class="relative flex flex-col md:flex-row items-center justify-between md:odd:flex-row-reverse">
                    <div class="absolute left-4 md:left-1/2 w-4 h-4 bg-rose-500 rounded-full -translate-x-2 z-10"></div>
                    <div class="w-full md:w-[45%] pl-8 md:pl-0 perspective-1000 h-64">
                        <div onclick="this.classList.toggle('rotate-y-180')" class="relative w-full h-full duration-500 preserve-3d cursor-pointer shadow-md rounded-2xl">
                            <div class="absolute inset-0 backface-hidden bg-white p-4 rounded-2xl border border-rose-50 flex flex-col items-center justify-center text-gray-400 font-medium">
                                [ Bachpan Ki Photo ]
                                <span class="text-xs bg-rose-100 text-rose-600 px-2 py-0.5 rounded-full mt-2">Tap Me</span>
                            </div>
                            <div class="absolute inset-0 bg-rose-100 p-6 rounded-2xl rotate-y-180 backface-hidden flex items-center justify-center border-2 border-rose-200 text-center">
                                <p class="text-gray-700 italic font-medium">"Ghar ki rani, papa ki pari, aur meri sabse pyaari dii!"</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECTION 3: QUIZ -->
        <section class="bg-rose-50/50 py-16 px-4">
            <div class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl border border-rose-100">
                <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">Who Knows Dii Better? 🤔</h2>
                <div id="quiz-box">
                    <p class="font-semibold text-gray-700 mb-4">Dii ka sabse bada secret fear kya hai?</p>
                    <div class="space-y-3">
                        <button onclick="checkAnswer(false, this)" class="w-full text-left p-3 border rounded-xl hover:bg-rose-50 transition">A) Cockroaches & Lizards 🪳</button>
                        <button onclick="checkAnswer(false, this)" class="w-full text-left p-3 border rounded-xl hover:bg-rose-50 transition">B) Mummy ki Daant 🤐</button>
                        <button onclick="checkAnswer(true, this)" class="w-full text-left p-3 border rounded-xl hover:bg-rose-50 transition">C) Mera uska khana kha lena 😈</button>
                    </div>
                    <p id="quiz-result" class="mt-4 text-center font-medium hidden"></p>
                </div>
            </div>
        </section>
    </div>

    <script>
        function unlockMemories() {
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Music blocked by browser policy"));
            const content = document.getElementById('main-content');
            content.classList.remove('hidden');
            setTimeout(() => { content.classList.remove('opacity-0'); content.classList.add('opacity-100'); }, 50);
            window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
        }
        function checkAnswer(isCorrect, element) {
            const resultMsg = document.getElementById('quiz-result');
            resultMsg.classList.remove('hidden');
            if (isCorrect) {
                element.classList.add('bg-green-100', 'border-green-400', 'text-green-800');
                resultMsg.innerText = "🎉 ABSOLUTELY CORRECT!";
                resultMsg.className = "mt-4 text-center font-medium text-green-600";
            } else {
                element.classList.add('bg-red-100', 'border-red-400', 'text-red-800');
                resultMsg.innerText = "❌ Wrong!";
                resultMsg.className = "mt-4 text-center font-medium text-red-500";
            }
        }
    </script>
</body>
</html>
